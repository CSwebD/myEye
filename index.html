<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nail & Brow Studio by Caterina - Chișinău">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💅</text></svg>">
    <title>Nail & Brow Studio | By Caterina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --crimson: #5a0a1a;
            --crimson-deep: #3d0612;
            --crimson-mid: #6e1526;
            --gold: #c9a882;
            --white: #ffffff;
            --text-light: rgba(255,255,255,0.75);
            --text-dimmer: rgba(255,255,255,0.45);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--crimson-deep);
            min-height: 100vh;
        }

        .card {
            width: min(440px, 96vw);
            margin: 0 auto;
            background: var(--crimson);
            overflow: hidden;
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 4px;
            padding: 14px 18px 0;
        }

        .lang-btn {
            background: none;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--text-dimmer);
            cursor: pointer;
            padding: 4px 8px;
            position: relative;
            transition: color 0.2s ease;
        }

        .lang-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 1px;
            background: var(--gold);
            transition: width 0.25s ease;
        }

        .lang-btn.active { color: var(--gold); }
        .lang-btn.active::after { width: 70%; }
        .lang-btn:hover { color: rgba(255,255,255,0.7); }

        .header {
            padding: 30px 30px 28px;
            text-align: center;
        }

        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.55rem, 7.5vw, 2rem);
            font-weight: 300;
            letter-spacing: 0.22em;
            color: var(--white);
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 6px;
            transform: scaleX(1.05);
            display: inline-block;
        }

        .brand-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--gold);
            display: block;
            margin-top: 2px;
        }

        .divider {
            height: 1px;
            margin: 0 30px;
            background: rgba(201,168,130,0.25);
        }

        .tagline {
            text-align: center;
            padding: 20px 30px 24px;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 0.88rem;
            color: var(--text-light);
            letter-spacing: 0.04em;
            line-height: 1.7;
        }

        /* ── SOCIAL ICONS ── */
        .contacts {
            padding: 0 30px 32px;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            text-decoration: none;
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
            flex-shrink: 0;
        }

        .contact-btn:hover,
        .contact-btn:active {
            transform: translateY(-4px) scale(1.1);
            opacity: 0.88;
        }

        .contact-btn svg {
            width: 52px;
            height: 52px;
        }

        /* Footer */
        .card-footer {
            background: rgba(0,0,0,0.25);
            padding: 12px 30px;
            text-align: center;
        }

        .card-footer-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.62rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dimmer);
        }

        /* ── GALLERY ── */
        .gallery-wrap {
            width: min(440px, 96vw);
            margin: 3px auto 0;
            padding-bottom: 40px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
        }

        .gallery-item {
            overflow: hidden;
            background: var(--crimson-mid);
            aspect-ratio: 1 / 1;
            cursor: pointer;
        }

        .gallery-item:nth-child(5n) {
            grid-column: span 2;
            aspect-ratio: 2 / 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: transform 0.5s ease, opacity 0.4s ease;
        }

        .gallery-item img.loaded { opacity: 1; }
        .gallery-item:hover img  { transform: scale(1.06); }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(15, 2, 6, 0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox.open {
            display: flex;
            animation: lbIn 0.2s ease;
        }

        @keyframes lbIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        .lightbox-img {
            max-width: 92vw;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 2px;
        }

        .lightbox-close {
            position: fixed;
            top: 16px; right: 20px;
            background: none; border: none;
            color: rgba(255,255,255,0.6);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
            font-family: sans-serif;
        }

        .lightbox-close:hover { color: white; }

        .lb-arrow {
            position: fixed;
            top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 1.5rem;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            font-family: sans-serif;
        }

        .lb-arrow:hover { background: rgba(255,255,255,0.18); }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }
    </style>
</head>
<body>

<!-- Gallery -->
<div class="gallery-wrap">
    <div class="gallery-grid" id="gallery"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLb()">✕</button>
    <button class="lb-arrow lb-prev" onclick="shiftLb(-1)">‹</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <button class="lb-arrow lb-next" onclick="shiftLb(1)">›</button>
</div>

<script>
    const T = {
        ro: {
            tagline: 'Manichiură profesională & laminare gene și sprâncene\nChișinău, sec. Botanica',
            footer: '068 135 924 · Chișinău, sec. Botanica'
        },
        ru: {
            tagline: 'Профессиональный маникюр и ламинирование ресниц и бровей\nКишинёв, р-н Ботаника',
            footer: '068 135 924 · Кишинёв, р-н Ботаника'
        },
        en: {
            tagline: 'Professional manicure & lash and brow lamination\nChișinău, Botanica district',
            footer: '068 135 924 · Chișinău, Botanica'
        }
    };

    function switchLang(lang, btn) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const lines = T[lang].tagline.split('\n');
        document.getElementById('tagline').innerHTML = lines.join('<br>');
        document.getElementById('footer-text').innerHTML = T[lang].footer.replace('·', '&nbsp;·&nbsp;');
    }

    /* Auto gallery */
    const galleryEl = document.getElementById('gallery');
    const loadedImages = [];
    let lbIndex = 0;

    function probeImage(src) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload  = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = src;
        });
    }

    async function buildGallery() {
        let misses = 0, i = 1;
        while (misses < 3 && i <= 99) {
            const src = `pic${i}.jpg`;
            const ok = await probeImage(src);
            if (ok) {
                misses = 0;
                const idx = loadedImages.length;
                loadedImages.push(src);
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.onclick = () => openLb(idx);
                const img = document.createElement('img');
                img.src = src; img.alt = ''; img.loading = 'lazy';
                img.onload = () => img.classList.add('loaded');
                item.appendChild(img);
                galleryEl.appendChild(item);
            } else {
                misses++;
            }
            i++;
        }
    }

    buildGallery();

    function openLb(idx) {
        lbIndex = idx;
        document.getElementById('lb-img').src = loadedImages[idx];
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeLb() {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
    }

    function shiftLb(dir) {
        lbIndex = (lbIndex + dir + loadedImages.length) % loadedImages.length;
        document.getElementById('lb-img').src = loadedImages[lbIndex];
    }

    document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeLb();
    });

    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'Escape') closeLb();
        if (e.key === 'ArrowLeft')  shiftLb(-1);
        if (e.key === 'ArrowRight') shiftLb(1);
    });
</script>
</body>
</html>
