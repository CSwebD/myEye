<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nail & Brow Studio by Caterina - Chișinău">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💅</text></svg>">
    <title>Nail & Brow Studio | By Caterina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --crimson: #560216;
            --crimson-deep: #3a0110;
            --gold: #c9986a;
            --cream: #f9f4ef;
            --white: #ffffff;
            --text-mid: #7a6a65;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--cream);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(201,152,106,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(86,2,22,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── CARD ── */
        .card {
            position: relative;
            z-index: 1;
            width: min(420px, 94vw);
            margin: 40px auto 0;
            background: var(--white);
            border-radius: 2px;
            overflow: hidden;
            box-shadow:
                0 2px 4px rgba(86,2,22,0.04),
                0 12px 40px rgba(86,2,22,0.10),
                0 40px 80px rgba(86,2,22,0.06);
            animation: cardReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-stripe {
            height: 3px;
            background: linear-gradient(90deg, var(--crimson-deep), var(--gold), var(--crimson));
        }

        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 2px;
            padding: 12px 18px 0;
        }

        .lang-btn {
            background: none;
            border: none;
            font-family: 'Jost', sans-serif;
            font-size: 0.68rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-mid);
            cursor: pointer;
            padding: 4px 7px;
            position: relative;
            transition: color 0.2s ease;
        }

        .lang-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 1px;
            background: var(--crimson);
            transition: width 0.25s ease;
        }

        .lang-btn.active { color: var(--crimson); font-weight: 500; }
        .lang-btn.active::after { width: 70%; }
        .lang-btn:hover { color: var(--crimson); }

        .header {
            padding: 28px 36px 24px;
            text-align: center;
        }

        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            animation: fadeIn 1s 0.3s both;
        }

        .ornament-line {
            height: 1px; width: 40px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }
        .ornament-line.right { background: linear-gradient(90deg, var(--gold), transparent); }

        .ornament-diamond {
            width: 5px; height: 5px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.9rem, 8vw, 2.4rem);
            font-weight: 300;
            letter-spacing: 0.18em;
            color: var(--crimson);
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 8px;
            animation: fadeIn 1s 0.2s both;
        }

        .brand-sub {
            font-family: 'Jost', sans-serif;
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: var(--gold);
            animation: fadeIn 1s 0.4s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .divider {
            height: 1px;
            margin: 0 36px;
            background: linear-gradient(90deg, transparent, rgba(201,152,106,0.4), transparent);
        }

        .tagline {
            text-align: center;
            padding: 18px 36px 22px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--text-mid);
            letter-spacing: 0.05em;
            line-height: 1.6;
            animation: fadeIn 1s 0.5s both;
        }

        /* Social icons — no labels, minimal circles */
        .contacts {
            padding: 0 36px 32px;
            display: flex;
            justify-content: center;
            gap: 14px;
            animation: fadeIn 1s 0.6s both;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            text-decoration: none;
            background: var(--white);
            border: 1px solid rgba(201,152,106,0.25);
            box-shadow: 0 2px 10px rgba(86,2,22,0.07);
            transition:
                transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.25s ease,
                border-color 0.25s ease;
        }

        .contact-btn svg {
            width: 20px;
            height: 20px;
        }

        .contact-btn:hover,
        .contact-btn:active {
            transform: translateY(-4px) scale(1.1);
            box-shadow: 0 8px 20px rgba(86,2,22,0.14);
            border-color: var(--gold);
        }

        .icon-instagram svg { color: #C13584; }
        .icon-facebook  svg { color: #1877F2; }
        .icon-viber     svg { color: #7360F2; }
        .icon-whatsapp  svg { color: #25D366; }
        .icon-phone     svg { color: var(--crimson); }

        .card-footer {
            background: var(--crimson);
            padding: 11px 36px;
            text-align: center;
        }

        .card-footer-text {
            font-family: 'Jost', sans-serif;
            font-size: 0.6rem;
            font-weight: 200;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }

        /* ── GALLERY ── */
        .gallery-wrap {
            position: relative;
            z-index: 1;
            width: min(420px, 94vw);
            margin: 3px auto 40px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
        }

        /* Every 5th item spans full width */
        .gallery-item:nth-child(5n) {
            grid-column: span 2;
        }

        .gallery-item {
            overflow: hidden;
            background: #e8ddd6;
            aspect-ratio: 1 / 1;
            cursor: pointer;
        }

        .gallery-item:nth-child(5n) {
            aspect-ratio: 2 / 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: transform 0.5s ease, opacity 0.4s ease;
        }

        .gallery-item img.loaded { opacity: 1; }
        .gallery-item:hover img { transform: scale(1.06); }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(20, 3, 8, 0.93);
            align-items: center;
            justify-content: center;
        }

        .lightbox.open {
            display: flex;
            animation: lbIn 0.2s ease;
        }

        @keyframes lbIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .lightbox-img {
            max-width: 92vw;
            max-height: 88vh;
            border-radius: 2px;
            object-fit: contain;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .lightbox-close {
            position: fixed;
            top: 16px; right: 20px;
            background: none; border: none;
            color: rgba(255,255,255,0.65);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .lightbox-close:hover { color: white; }

        .lb-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 1.5rem;
            width: 42px; height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .lb-arrow:hover { background: rgba(255,255,255,0.18); }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-stripe"></div>

    <div class="lang-bar">
        <button class="lang-btn active" onclick="switchLang('ro', this)">RO</button>
        <button class="lang-btn" onclick="switchLang('ru', this)">RU</button>
        <button class="lang-btn" onclick="switchLang('en', this)">EN</button>
    </div>

    <div class="header">
        <div class="ornament">
            <div class="ornament-line"></div>
            <div class="ornament-diamond"></div>
            <div class="ornament-line right"></div>
        </div>
        <div class="brand-name">Nail &amp; Brow Studio</div>
        <div class="brand-sub">by Caterina</div>
    </div>

    <div class="divider"></div>

    <p class="tagline" id="tagline">
        Manichiură profesională &amp; laminare gene și sprâncene în Chișinău
    </p>

    <div class="contacts">
        <a class="contact-btn icon-instagram" href="https://instagram.com/lami.studio.by.caterina" target="_blank" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
            </svg>
        </a>

        <a class="contact-btn icon-facebook" href="https://www.facebook.com/lamistudio.bycaterina" target="_blank" aria-label="Facebook">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
            </svg>
        </a>

        <a class="contact-btn icon-viber" href="viber://chat?number=%2B37368135924" aria-label="Viber">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.66 8.55c-.36-3.3-2.87-5.51-6.14-5.62C14.18 2.92 13.35 2.9 12 2.9c-1.35 0-2.18.02-2.52.03C6.21 3.04 3.7 5.25 3.34 8.55 3.18 9.96 3.18 11.37 3.34 12.78c.36 3.3 2.87 5.51 6.14 5.62.34.01 1.17.03 2.52.03v2.64l2.5-2.64c2.07-.19 3.83-1.3 4.8-3.03.45-.8.67-1.7.62-2.62a18.47 18.47 0 0 0 0-4.23z"/>
                <path d="M14.5 14.5s-.5.5-1.5.5c-1.5 0-3-1.5-3-1.5S8.5 12 8.5 10.5c0-1 .5-1.5.5-1.5l1-.5c.3 0 .5.2.6.5l.5 1.5c.1.3 0 .6-.2.8l-.4.4c.3.6.7 1 1.4 1.3l.4-.4c.2-.2.5-.3.8-.2l1.5.5c.3.1.5.3.5.6l-.1 1z"/>
            </svg>
        </a>

        <a class="contact-btn icon-whatsapp" href="https://wa.me/37368135924" target="_blank" aria-label="WhatsApp">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
        </a>

        <a class="contact-btn icon-phone" href="tel:+37368135924" aria-label="Phone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
        </a>
    </div>

    <div class="card-footer">
        <p class="card-footer-text" id="footer-text">Chișinău, Moldova</p>
    </div>
</div>

<!-- Gallery renders below the card automatically -->
<div class="gallery-wrap">
    <div class="gallery-grid" id="gallery"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLb()">✕</button>
    <button class="lb-arrow lb-prev" onclick="shiftLb(-1)">‹</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <button class="lb-arrow lb-next" onclick="shiftLb(1)">›</button>
</div>

<script>
    /* Language */
    const T = {
        ro: { tagline: 'Manichiură profesională & laminare gene și sprâncene în Chișinău', footer: 'Chișinău, Moldova' },
        ru: { tagline: 'Профессиональный маникюр и ламинирование ресниц и бровей в Кишинёве', footer: 'Кишинёв, Молдова' },
        en: { tagline: 'Professional manicure & lash and brow lamination in Chișinău', footer: 'Chișinău, Moldova' }
    };

    function switchLang(lang, btn) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tagline').textContent = T[lang].tagline;
        document.getElementById('footer-text').textContent = T[lang].footer;
    }

    /* Auto gallery — probes pic1.jpg, pic2.jpg … stops after 3 consecutive misses */
    const galleryEl = document.getElementById('gallery');
    const loadedImages = [];
    let lbIndex = 0;

    function probeImage(src) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload  = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = src;
        });
    }

    async function buildGallery() {
        let misses = 0;
        let i = 1;
        while (misses < 3 && i <= 99) {
            const src = `pic${i}.jpg`;
            const ok = await probeImage(src);
            if (ok) {
                misses = 0;
                const idx = loadedImages.length;
                loadedImages.push(src);

                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.onclick = () => openLb(idx);

                const img = document.createElement('img');
                img.src = src;
                img.alt = '';
                img.loading = 'lazy';
                img.onload = () => img.classList.add('loaded');

                item.appendChild(img);
                galleryEl.appendChild(item);
            } else {
                misses++;
            }
            i++;
        }
    }

    buildGallery();

    /* Lightbox */
    function openLb(idx) {
        lbIndex = idx;
        document.getElementById('lb-img').src = loadedImages[idx];
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeLb() {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
    }

    function shiftLb(dir) {
        lbIndex = (lbIndex + dir + loadedImages.length) % loadedImages.length;
        document.getElementById('lb-img').src = loadedImages[lbIndex];
    }

    document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeLb();
    });

    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'Escape') closeLb();
        if (e.key === 'ArrowLeft')  shiftLb(-1);
        if (e.key === 'ArrowRight') shiftLb(1);
    });
</script>
</body>
</html>
