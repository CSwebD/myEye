<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nail & Brow Studio by Caterina - Chișinău">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💅</text></svg>">
    <title>Nail & Brow Studio | By Caterina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --crimson: #5a0a1a;
            --crimson-deep: #3d0612;
            --crimson-mid: #6e1526;
            --gold: #c9a882;
            --cream: #f5eeea;
            --white: #ffffff;
            --text-light: rgba(255,255,255,0.75);
            --text-dimmer: rgba(255,255,255,0.45);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--crimson-deep);
            min-height: 100vh;
        }

        /* ── CARD ── */
        .card {
            width: min(440px, 96vw);
            margin: 0 auto;
            background: var(--crimson);
            overflow: hidden;
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            position: relative;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Lang */
        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 4px;
            padding: 14px 18px 0;
        }

        .lang-btn {
            background: none;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--text-dimmer);
            cursor: pointer;
            padding: 4px 8px;
            position: relative;
            transition: color 0.2s ease;
        }

        .lang-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 1px;
            background: var(--gold);
            transition: width 0.25s ease;
        }

        .lang-btn.active { color: var(--gold); }
        .lang-btn.active::after { width: 70%; }
        .lang-btn:hover { color: rgba(255,255,255,0.7); }

        /* Brand */
        .header {
            padding: 30px 30px 28px;
            text-align: center;
        }

        .brand-name {
            /* Agrandir-style: wide, thin, uppercase — Montserrat 300 stretched */
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.55rem, 7.5vw, 2rem);
            font-weight: 300;
            letter-spacing: 0.22em;
            color: var(--white);
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 6px;
            /* Slight horizontal stretch like Agrandir Grand */
            transform: scaleX(1.05);
            display: inline-block;
        }

        .brand-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--gold);
            display: block;
            margin-top: 2px;
        }

        /* Divider */
        .divider {
            height: 1px;
            margin: 0 30px;
            background: rgba(201,168,130,0.25);
        }

        /* Tagline */
        .tagline {
            text-align: center;
            padding: 20px 30px 24px;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 0.88rem;
            color: var(--text-light);
            letter-spacing: 0.04em;
            line-height: 1.7;
        }

        /* ── SOCIAL ICONS — large, clear, properly branded ── */
        .contacts {
            padding: 0 30px 32px;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            text-decoration: none;
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
            position: relative;
            overflow: hidden;
        }

        .contact-btn:hover,
        .contact-btn:active {
            transform: translateY(-4px) scale(1.08);
            opacity: 0.92;
        }

        .contact-btn svg {
            width: 28px;
            height: 28px;
            position: relative;
            z-index: 1;
        }

        /* Each platform gets its real brand color as bg */
        .icon-instagram {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
        }

        .icon-facebook {
            background: #1877F2;
        }

        .icon-viber {
            background: #7360F2;
        }

        .icon-whatsapp {
            background: #25D366;
        }

        .icon-phone {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(201,168,130,0.35);
        }

        /* All icons white on colored bg */
        .contact-btn svg {
            color: white;
        }

        /* Footer */
        .card-footer {
            background: rgba(0,0,0,0.25);
            padding: 12px 30px;
            text-align: center;
        }

        .card-footer-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.62rem;
            font-weight: 400;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-dimmer);
        }

        /* ── GALLERY ── */
        .gallery-wrap {
            width: min(440px, 96vw);
            margin: 3px auto 0;
            padding-bottom: 40px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
        }

        .gallery-item {
            overflow: hidden;
            background: var(--crimson-mid);
            aspect-ratio: 1 / 1;
            cursor: pointer;
        }

        /* Every 5th spans full width */
        .gallery-item:nth-child(5n) {
            grid-column: span 2;
            aspect-ratio: 2 / 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: transform 0.5s ease, opacity 0.4s ease;
        }

        .gallery-item img.loaded { opacity: 1; }
        .gallery-item:hover img  { transform: scale(1.06); }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(15, 2, 6, 0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox.open {
            display: flex;
            animation: lbIn 0.2s ease;
        }

        @keyframes lbIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        .lightbox-img {
            max-width: 92vw;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 2px;
        }

        .lightbox-close {
            position: fixed;
            top: 16px; right: 20px;
            background: none; border: none;
            color: rgba(255,255,255,0.6);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
            font-family: sans-serif;
        }

        .lightbox-close:hover { color: white; }

        .lb-arrow {
            position: fixed;
            top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 1.5rem;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            font-family: sans-serif;
        }

        .lb-arrow:hover { background: rgba(255,255,255,0.18); }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-bar">
        <button class="lang-btn active" onclick="switchLang('ro', this)">RO</button>
        <button class="lang-btn" onclick="switchLang('ru', this)">RU</button>
        <button class="lang-btn" onclick="switchLang('en', this)">EN</button>
    </div>

    <div class="header">
        <span class="brand-name">Nail &amp; Brow Studio</span>
        <span class="brand-sub">by Caterina</span>
    </div>

    <div class="divider"></div>

    <p class="tagline" id="tagline">
        Manichiură profesională &amp; laminare gene și sprâncene<br>Chișinău, sec. Botanica
    </p>

    <div class="contacts">

        <!-- Instagram -->
        <a class="contact-btn icon-instagram" href="https://instagram.com/lami.studio.by.caterina" target="_blank" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
            </svg>
        </a>

        <!-- Facebook -->
        <a class="contact-btn icon-facebook" href="https://www.facebook.com/lamistudio.bycaterina" target="_blank" aria-label="Facebook">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
            </svg>
        </a>

        <!-- Viber -->
        <a class="contact-btn icon-viber" href="viber://chat?number=%2B37368135924" aria-label="Viber">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.66 8.55c-.36-3.3-2.87-5.51-6.14-5.62C14.18 2.92 13.35 2.9 12 2.9c-1.35 0-2.18.02-2.52.03C6.21 3.04 3.7 5.25 3.34 8.55 3.18 9.96 3.18 11.37 3.34 12.78c.36 3.3 2.87 5.51 6.14 5.62.34.01 1.17.03 2.52.03v2.64l2.5-2.64c2.07-.19 3.83-1.3 4.8-3.03.45-.8.67-1.7.62-2.62a18.47 18.47 0 0 0 0-4.23z"/>
                <path d="M14.5 14.5s-.5.5-1.5.5c-1.5 0-3-1.5-3-1.5S8.5 12 8.5 10.5c0-1 .5-1.5.5-1.5l1-.5c.3 0 .5.2.6.5l.5 1.5c.1.3 0 .6-.2.8l-.4.4c.3.6.7 1 1.4 1.3l.4-.4c.2-.2.5-.3.8-.2l1.5.5c.3.1.5.3.5.6l-.1 1z"/>
            </svg>
        </a>

        <!-- WhatsApp -->
        <a class="contact-btn icon-whatsapp" href="https://wa.me/37368135924" target="_blank" aria-label="WhatsApp">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
        </a>

        <!-- Phone -->
        <a class="contact-btn icon-phone" href="tel:+37368135924" aria-label="Call">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
        </a>

    </div>

    <div class="card-footer">
        <p class="card-footer-text" id="footer-text">068 135 924 &nbsp;·&nbsp; Chișinău, sec. Botanica</p>
    </div>
</div>

<!-- Gallery -->
<div class="gallery-wrap">
    <div class="gallery-grid" id="gallery"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLb()">✕</button>
    <button class="lb-arrow lb-prev" onclick="shiftLb(-1)">‹</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <button class="lb-arrow lb-next" onclick="shiftLb(1)">›</button>
</div>

<script>
    const T = {
        ro: {
            tagline: 'Manichiură profesională & laminare gene și sprâncene\nChișinău, sec. Botanica',
            footer: '068 135 924 · Chișinău, sec. Botanica'
        },
        ru: {
            tagline: 'Профессиональный маникюр и ламинирование ресниц и бровей\nКишинёв, р-н Ботаника',
            footer: '068 135 924 · Кишинёв, р-н Ботаника'
        },
        en: {
            tagline: 'Professional manicure & lash and brow lamination\nChișinău, Botanica district',
            footer: '068 135 924 · Chișinău, Botanica'
        }
    };

    function switchLang(lang, btn) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const lines = T[lang].tagline.split('\n');
        document.getElementById('tagline').innerHTML = lines.join('<br>');
        document.getElementById('footer-text').innerHTML = T[lang].footer.replace('·', '&nbsp;·&nbsp;');
    }

    /* Auto gallery */
    const galleryEl = document.getElementById('gallery');
    const loadedImages = [];
    let lbIndex = 0;

    function probeImage(src) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload  = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = src;
        });
    }

    async function buildGallery() {
        let misses = 0, i = 1;
        while (misses < 3 && i <= 99) {
            const src = `pic${i}.jpg`;
            const ok = await probeImage(src);
            if (ok) {
                misses = 0;
                const idx = loadedImages.length;
                loadedImages.push(src);

                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.onclick = () => openLb(idx);

                const img = document.createElement('img');
                img.src = src;
                img.alt = '';
                img.loading = 'lazy';
                img.onload = () => img.classList.add('loaded');

                item.appendChild(img);
                galleryEl.appendChild(item);
            } else {
                misses++;
            }
            i++;
        }
    }

    buildGallery();

    function openLb(idx) {
        lbIndex = idx;
        document.getElementById('lb-img').src = loadedImages[idx];
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeLb() {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
    }

    function shiftLb(dir) {
        lbIndex = (lbIndex + dir + loadedImages.length) % loadedImages.length;
        document.getElementById('lb-img').src = loadedImages[lbIndex];
    }

    document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeLb();
    });

    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'Escape') closeLb();
        if (e.key === 'ArrowLeft')  shiftLb(-1);
        if (e.key === 'ArrowRight') shiftLb(1);
    });
</script>
</body>
</html>
